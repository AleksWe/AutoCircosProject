
<ideogram>

<spacing>
default = 0.005r
<pairwise anurchr>
spacing = 5r
</pairwise>
</spacing>

# Ideogram position, fill and outline
radius           = 0.90r
thickness        = 20p
fill             = yes
fill_color       = black
stroke_color     = black
stroke_thickness = 2p

# Minimum definition for ideogram labels.
show_label       = no
# see etc/fonts.conf for list of font names
label_font       = default 
#label_radius     = dims(image,radius)-200p
#label_radius = (dims(ideogram,radius_inner)+dims(ideogram,radius_outer))/2-20
label_radius = dims(ideogram,radius_inner) -50p
label_size       = 45
label_parallel   = yes

</ideogram>

